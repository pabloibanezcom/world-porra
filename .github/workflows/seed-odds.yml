name: Seed Match Odds

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "yes" to confirm seeding odds into the database'
        required: true
        default: 'no'

jobs:
  seed:
    name: Seed mock odds
    runs-on: ubuntu-latest
    environment: production
    if: ${{ github.event.inputs.confirm == 'yes' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run seed:odds
        run: npm run seed:odds --workspace=api
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
