name: Seed Team Colors

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "yes" to confirm seeding team colors into the database'
        required: true
        default: 'no'

jobs:
  seed:
    name: Seed team colors
    runs-on: ubuntu-latest
    environment: production
    if: ${{ github.event.inputs.confirm == 'yes' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run seed:team-colors
        run: npm run seed:team-colors --workspace=api
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
