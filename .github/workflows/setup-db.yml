name: Setup DB

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Which databases to populate'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging
          - both
      source_db:
        description: 'Source database name on the dev/reference cluster'
        required: true
        default: 'test'
      production_db:
        description: 'Target production database name'
        required: true
        default: 'world-porra'
      staging_db:
        description: 'Target staging database name'
        required: true
        default: 'world-porra-stg'
      confirm:
        description: 'Type "copy-reference-data" to confirm'
        required: true
        default: 'no'

jobs:
  setup-db:
    name: Copy reference data from dev/reference cluster
    runs-on: ubuntu-latest
    environment: production
    if: ${{ github.event.inputs.confirm == 'copy-reference-data' }}

    env:
      SOURCE_DB: ${{ inputs.source_db }}
      PROD_DB: ${{ inputs.production_db }}
      STG_DB: ${{ inputs.staging_db }}
      DUMP_PATH: /tmp/world-porra-dump

    steps:
      - name: Install MongoDB tools
        run: |
          wget -q https://fastdl.mongodb.org/tools/db/mongodb-database-tools-ubuntu2204-x86_64-100.9.5.tgz
          tar -xzf mongodb-database-tools-ubuntu2204-x86_64-100.9.5.tgz
          sudo cp mongodb-database-tools-*/bin/* /usr/local/bin/
          mongodump --version

      - name: Dump source database
        env:
          SOURCE_MONGODB_URI: ${{ secrets.SOURCE_MONGODB_URI }}
        run: |
          if [ -z "$SOURCE_MONGODB_URI" ]; then
            echo "Missing SOURCE_MONGODB_URI secret with the dev/reference Atlas connection string."
            exit 1
          fi

          mongodump \
            --uri="$SOURCE_MONGODB_URI" \
            --db="$SOURCE_DB" \
            --out="$DUMP_PATH"

          # Remove user-generated collections from the dump before restoring
          for col in users leagues predictions grouppredictions tournamentpredictions pushsubscriptions leaguereminderlogs; do
            rm -f "$DUMP_PATH/$SOURCE_DB/${col}.bson"
            rm -f "$DUMP_PATH/$SOURCE_DB/${col}.metadata.json"
            echo "Excluded $col from dump"
          done

          echo "Collections to restore:"
          ls "$DUMP_PATH/$SOURCE_DB/"

      - name: Restore to production
        if: ${{ inputs.target == 'both' || inputs.target == 'production' }}
        env:
          TARGET_MONGODB_URI: ${{ secrets.PROD_MONGODB_URI }}
        run: |
          if [ -z "$TARGET_MONGODB_URI" ]; then
            echo "Missing PROD_MONGODB_URI secret with the production Atlas connection string."
            exit 1
          fi

          mongorestore \
            --uri="$TARGET_MONGODB_URI" \
            --nsFrom="${SOURCE_DB}.*" \
            --nsTo="${PROD_DB}.*" \
            --drop \
            "$DUMP_PATH"
          echo "Restored to $PROD_DB"

      - name: Restore to staging
        if: ${{ inputs.target == 'both' || inputs.target == 'staging' }}
        env:
          TARGET_MONGODB_URI: ${{ secrets.STG_MONGODB_URI }}
        run: |
          if [ -z "$TARGET_MONGODB_URI" ]; then
            echo "Missing STG_MONGODB_URI secret with the staging Atlas connection string."
            exit 1
          fi

          mongorestore \
            --uri="$TARGET_MONGODB_URI" \
            --nsFrom="${SOURCE_DB}.*" \
            --nsTo="${STG_DB}.*" \
            --drop \
            "$DUMP_PATH"
          echo "Restored to $STG_DB"

      - name: Summary
        run: |
          echo "## DB Setup Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Target:** ${{ inputs.target }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Reference data copied:** countryteams, matches, pollconfigs" >> $GITHUB_STEP_SUMMARY
          echo "**User data excluded:** users, leagues, predictions, grouppredictions, tournamentpredictions, pushsubscriptions, leaguereminderlogs" >> $GITHUB_STEP_SUMMARY
