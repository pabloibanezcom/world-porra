name: Setup DB

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Which databases to populate'
        required: true
        default: 'both'
        type: choice
        options:
          - both
          - production
          - staging

jobs:
  setup-db:
    name: Copy reference data from test → prod/stg
    runs-on: ubuntu-latest

    env:
      SOURCE_DB: test
      PROD_DB: world-porra
      STG_DB: world-porra-stg
      DUMP_PATH: /tmp/world-porra-dump

    steps:
      - name: Install MongoDB tools
        run: |
          wget -q https://fastdl.mongodb.org/tools/db/mongodb-database-tools-ubuntu2204-x86_64-100.9.5.tgz
          tar -xzf mongodb-database-tools-ubuntu2204-x86_64-100.9.5.tgz
          sudo cp mongodb-database-tools-*/bin/* /usr/local/bin/
          mongodump --version

      - name: Dump source database (test)
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
        run: |
          mongodump \
            --uri="$MONGODB_URI" \
            --db="$SOURCE_DB" \
            --out="$DUMP_PATH"

          # Remove user-generated collections from the dump before restoring
          for col in users leagues predictions grouppredictions tournamentpredictions pushsubscriptions; do
            rm -f "$DUMP_PATH/$SOURCE_DB/${col}.bson"
            rm -f "$DUMP_PATH/$SOURCE_DB/${col}.metadata.json"
            echo "Excluded $col from dump"
          done

          echo "Collections to restore:"
          ls "$DUMP_PATH/$SOURCE_DB/"

      - name: Restore to production
        if: ${{ inputs.target == 'both' || inputs.target == 'production' }}
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
        run: |
          BASE_URI=$(echo "$MONGODB_URI" | grep -oE 'mongodb\+srv://[^/]+')
          mongorestore \
            --uri="$BASE_URI/$PROD_DB?appName=Cluster0" \
            --db="$PROD_DB" \
            --drop \
            "$DUMP_PATH/$SOURCE_DB"
          echo "Restored to $PROD_DB"

      - name: Restore to staging
        if: ${{ inputs.target == 'both' || inputs.target == 'staging' }}
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
        run: |
          BASE_URI=$(echo "$MONGODB_URI" | grep -oE 'mongodb\+srv://[^/]+')
          mongorestore \
            --uri="$BASE_URI/$STG_DB?appName=Cluster0" \
            --db="$STG_DB" \
            --drop \
            "$DUMP_PATH/$SOURCE_DB"
          echo "Restored to $STG_DB"

      - name: Summary
        run: |
          echo "## DB Setup Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Target:** ${{ inputs.target }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Reference data copied:** countryteams, matches, pollconfigs" >> $GITHUB_STEP_SUMMARY
          echo "**User data excluded:** users, leagues, predictions, grouppredictions, tournamentpredictions, pushsubscriptions" >> $GITHUB_STEP_SUMMARY
